<!DOCTYPE html>
<html lang="de">
<head>
    <script>
        // Version
  const Version = "0.59";
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalender Generator Bienen</title>

    <!-- Zeitpläne laden -->
    <script src="schedules.js"></script>

<!-- sicherstellen, dass emojiMap global verfügbar ist -->
    <script>
    if (typeof emojiMap !== "undefined") {
         window.emojiMap = emojiMap;
        }
    </script>

    <!-- CSS laden -->
    <link rel="stylesheet" href="style.css">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.4.0/jspdf.umd.min.js"></script>
    
    <!-- Ausgelagerte Funktionen laden -->
    <script src="wheel.js"></script>
    <script src="downloads.js"></script>
</head>

<body>
    <h1 class="header">
        <span>Kalender Generator Bienen</span>
        <span class="version" id="versionTag"></span>
    </h1>

    <div class="button-row" style="text-align: center;">
        <button class="impressum-btn" onclick="window.location.href='anleitung.html'">
            📖 Anleitung
     </button>
        <button class="impressum-btn" onclick="window.location.href='info.html'">
            ℹ️ Info
        </button>
    </div>

    <form id="generalForm">
     <label for="prefix">Benennung des Zeitplans:</label>
        <input type="text" id="prefix" placeholder="z.B. SBA1, Serie_23 o.ä.">

        <label for="scheduleType">Wählen Sie einen Zeitplan:</label>
        <select id="scheduleType" onchange="populateSteps()">
    <option value="">Bitte wählen</option>
        </select>

        <label for="steps">Wählen Sie einen Arbeitsschritt:</label>
    <select id="steps" disabled onchange="onStepSelected()">
       <option value="">Bitte zuerst einen Typ wählen</option>
        </select>

        <!-- Toggle zwischen Kalender und Drehscheibe -->
        <div id="dateSelectionToggle" class="date-selection-container hidden">
            <label>Wählen Sie die Datumseingabe:</label>
      <div class="toggle">
      <button type="button" id="btnCalendar" class="active" onclick="switchDateMode('calendar')">📅 Kalender</button>
            <button type="button" id="btnWheel" onclick="switchDateMode('wheel')">🌀 Drehscheibe</button>
     </div>
    </div>

    <!-- Kalender Modus -->
        <div id="calendarMode" class="hidden">
         <label for="startDate">Wählen Sie das Datum für den Arbeitsschritt:</label>
 <input type="date" id="startDate" onchange="generateSchedule()">
     </div>

        <!-- Drehscheiben Modus -->
        <div id="wheelMode" class="hidden">
            <div class="wheel-container">
      <div class="pointer"></div>
         <canvas id="wheelCanvas" width="200" height="200"></canvas>
            </div>

            <div id="wheelDateDisplay"></div>

        <div class="wheel-buttons">
    <button type="button" onclick="adjustDay(-1)">⬅️ -1 Tag</button>
       <button type="button" onclick="adjustDay(1)">➡️ +1 Tag</button>
            </div>
        </div>
    </form>

    <!-- Vorschau-Sektion (ohne Checkboxen) -->
    <div id="previewSection" class="zeitplan hidden">
      <h2 id="zeitplanTitle"></h2>
        <ul id="previewList"></ul>

        <div id="noPrefixWarning" class="hidden" style="background-color: #fff3cd; border: 1px solid #ffc107; padding: 10px; margin: 10px 0; border-radius: 5px;">
    ⚠️ <strong>Hinweis:</strong> Sie haben keine Benennung des Zeitplans eingegeben. Die Dateinamen werden ohne die Benennung erstellt.
     </div>

      <button type="button" onclick="goToFinalPage()">Weiter ➡️</button>
    </div>

    <!-- Finaler Zeitplan (mit Checkboxen) -->
    <div id="zeitplan" class="zeitplan hidden">
        <button type="button" onclick="goBackToPreview()" style="margin-bottom: 15px;">⬅️ Zurück</button>
        <h2 id="zeitplanTitle2"></h2>
     <ul id="scheduleList"></ul>

   <button type="button" onclick="downloadICS()">📅 Als ICS herunterladen</button>
        <button type="button" onclick="downloadPDF()">📄 Als PDF herunterladen</button>
    </div>

<script>
    /* ===== GLOBALE KONSTANTEN (Optimierung #2) ===== */
    const WEEKDAYS = ["So", "Mo", "Di", "Mi", "Do", "Fr", "Sa"];
    const MONTHS = ["Januar", "Februar", "März", "April", "Mai", "Juni", 
             "Juli", "August", "September", "Oktober", "November", "Dezember"];

    /* ===== PDF KONFIGURATION (Optimierung #11) ===== */
    const PDF_CONFIG = {
pageHeight: 280,
        margin: 20,
        taskOffset: 35,
     titleFontSize: 20,
        textFontSize: 14,
        lineSpacing: 7,
        sectionSpacing: 1.2
    };

    /* ===== GLOBALE VARIABLEN ===== */
    let year;
    let downloadFileName;
    let title = '';
    let scheduleData = [];

    const testTheHtml = false;

    /* ===== DOM ELEMENTE CACHEN (Optimierung #3) ===== */
    const DOM = {};

    function cacheDOMElements() {
        DOM.prefix = document.getElementById('prefix');
        DOM.scheduleType = document.getElementById('scheduleType');
        DOM.steps = document.getElementById('steps');
        DOM.startDate = document.getElementById('startDate');
     DOM.dateSelectionToggle = document.getElementById('dateSelectionToggle');
        DOM.calendarMode = document.getElementById('calendarMode');
        DOM.wheelMode = document.getElementById('wheelMode');
        DOM.btnCalendar = document.getElementById('btnCalendar');
        DOM.btnWheel = document.getElementById('btnWheel');
      DOM.previewSection = document.getElementById('previewSection');
  DOM.zeitplan = document.getElementById('zeitplan');
        DOM.zeitplanTitle = document.getElementById('zeitplanTitle');
        DOM.zeitplanTitle2 = document.getElementById('zeitplanTitle2');
     DOM.previewList = document.getElementById('previewList');
        DOM.scheduleList = document.getElementById('scheduleList');
        DOM.generalForm = document.getElementById('generalForm');
        DOM.wheelDateDisplay = document.getElementById('wheelDateDisplay');
        DOM.wheelCanvas = document.getElementById('wheelCanvas');
        DOM.noPrefixWarning = document.getElementById('noPrefixWarning');
    }

/* ===== FEHLERBEHANDLUNG (Optimierung #15) ===== */
    function validateDependencies() {
        if (typeof schedules === 'undefined') {
  alert('❌ Fehler: schedules.js konnte nicht geladen werden!\n\nBitte stelle sicher, dass die Datei schedules.js im gleichen Verzeichnis liegt.');
    return false;
 }
        if (typeof emojiMap === 'undefined') {
console.warn('⚠️ Warnung: emojiMap nicht gefunden. Emojis werden nicht angezeigt.');
        }
        return true;
    }

    /* ===== INITIALISIERUNG ===== */
    function setTestValues() {
        if (testTheHtml) {
          DOM.prefix.value = 'TestPrefix';
  DOM.scheduleType.value = 'TuB';
            populateSteps();
      DOM.steps.value = '0';
        DOM.startDate.value = '2025-06-01';
            
 onStepSelected();
        }
 }

    function getFormState() {
        return {
          prefix: DOM.prefix.value.trim(),
  scheduleType: DOM.scheduleType.value,
    steps: parseInt(DOM.steps.value),
            startDate: DOM.startDate.value,
        };
    }

    document.addEventListener('DOMContentLoaded', () => {
     // Prüfe Abhängigkeiten
        if (!validateDependencies()) {
 return;
        }

     cacheDOMElements();
        document.getElementById('versionTag').textContent = "v" + Version;
        populateScheduleTypes();
    
        // Drehscheibe initialisieren
  initWheel();
 
        // Versuche gespeicherten Zustand wiederherzustellen
    restoreFormState();
        
     // Falls kein gespeicherter Zustand, setze Testwerte
        if (!sessionStorage.getItem('formState')) {
setTestValues();
        }
    });

    /* ===== FORMULAR FUNKTIONEN ===== */
    function populateScheduleTypes() {
        Object.keys(schedules).forEach(type => {
            const option = document.createElement('option');
            option.value = type;
            option.textContent = type;
   DOM.scheduleType.appendChild(option);
        });
    }

    function populateSteps() {
        const scheduleType = DOM.scheduleType.value;

DOM.steps.innerHTML = '';
        DOM.steps.disabled = !scheduleType;

        if (!scheduleType) {
     DOM.steps.innerHTML = '<option value="">Bitte zuerst einen Typ wählen</option>';
            DOM.dateSelectionToggle.classList.add('hidden');
         DOM.calendarMode.classList.add('hidden');
     DOM.wheelMode.classList.add('hidden');
            DOM.previewSection.classList.add('hidden');
        DOM.zeitplan.classList.add('hidden');
          return;
        }

        schedules[scheduleType]
            .filter(({ selectable }) => selectable)
            .forEach(({ offset, task }) => {
                const option = document.createElement('option');
                option.value = offset;
    option.textContent = task;
         DOM.steps.appendChild(option);
            });
        
        if (!sessionStorage.getItem('formState') && DOM.steps.options.length > 0) {
 DOM.steps.selectedIndex = 0;
         onStepSelected();
        } else if (sessionStorage.getItem('formState') && DOM.steps.value !== '') {
        onStepSelected();
        }
    }

      function onStepSelected() {
      if (DOM.steps.value !== '') {
        DOM.dateSelectionToggle.classList.remove('hidden');

        // Immer Kalender-Modus als Standard setzen
        DOM.calendarMode.classList.remove('hidden');
        DOM.wheelMode.classList.add('hidden');
        DOM.btnCalendar.classList.add('active');
        DOM.btnWheel.classList.remove('active');

        if (!DOM.startDate.value) {
          const today = new Date();
          DOM.startDate.valueAsDate = today;
        }

        generateSchedule();

        // Event Listener für Prefix-Feld hinzufügen (nur einmal)
        if (!DOM.prefix.dataset.listenerAdded) {
          DOM.prefix.addEventListener('input', updatePrefixWarning);
          DOM.prefix.dataset.listenerAdded = 'true';
        }
      } else {
        DOM.dateSelectionToggle.classList.add('hidden');
        DOM.calendarMode.classList.add('hidden');
        DOM.wheelMode.classList.add('hidden');
        DOM.previewSection.classList.add('hidden');
        DOM.zeitplan.classList.add('hidden');
      }
    }


    function switchDateMode(mode) {
        if (mode === 'calendar') {
  DOM.calendarMode.classList.remove('hidden');
            DOM.wheelMode.classList.add('hidden');
       DOM.btnCalendar.classList.add('active');
  DOM.btnWheel.classList.remove('active');
     
         generateSchedule();
  } else {
            DOM.calendarMode.classList.add('hidden');
            DOM.wheelMode.classList.remove('hidden');
            DOM.btnCalendar.classList.remove('active');
 DOM.btnWheel.classList.add('active');
     
     // Drehscheibe aktualisieren
            drawWheel();
       updateWheelCalculation();
  
         generateSchedule();
        }
    }

    /* ===== DATUM FORMATIERUNG (Optimierung #17) ===== */
    function formatDateLong(date) {
        const dayName = WEEKDAYS[date.getDay()];
        const day = date.getDate();
        const monthName = MONTHS[date.getMonth()];
  // Datum ausgeben
        return `${dayName} ${day}. ${monthName}:`;
    }

    function formatDateShort(date) {
        const dayName = WEEKDAYS[date.getDay()];
        return date.toLocaleDateString('de-DE') + " (" + dayName + ")";
    }

    function formatDateISO(date) {
        return date.toISOString().split('T')[0].replace(/-/g, '');
    }

    /* ===== ZEITPLAN GENERIERUNG ===== */
 function generateSchedule() {
        const state = getFormState();
        
        let selectedDate;
     if (DOM.calendarMode.classList.contains('hidden')) {
        selectedDate = getWheelDate();
        } else {
            if (!state.startDate) return;
        selectedDate = new Date(state.startDate);
        }

        year = selectedDate.getFullYear();

        title = `${state.prefix ? state.prefix + '_' : ''}${state.scheduleType}-Zeitplan ${year}`;
        DOM.zeitplanTitle.textContent = title;

     downloadFileName = `${year}_${state.prefix ? state.prefix + '_' : ''}${state.scheduleType}-Zeitplan`;

        scheduleData = createScheduleData(state.scheduleType, selectedDate, state.steps);

        renderList('previewList', false);
  DOM.previewSection.classList.remove('hidden');
        DOM.zeitplan.classList.add('hidden');
    }

    /* ===== LISTEN RENDERING (Optimierung #4) ===== */
function renderList(listId, withCheckboxes) {
        const list = document.getElementById(listId);
        list.innerHTML = '';

        scheduleData.forEach(({ dateFormatted, task }, index) => {
    const listItem = document.createElement('li');

    if (withCheckboxes) {
  const checkbox = document.createElement('input');
         checkbox.type = 'checkbox';
       checkbox.checked = true;
          checkbox.className = 'checkbox';
      listItem.appendChild(checkbox);
    }

     const dateSpan = document.createElement('strong');
            dateSpan.textContent = dateFormatted;
            
  const taskSpan = document.createElement('span');
          taskSpan.textContent = task;
   if (withCheckboxes) {
   taskSpan.classList.add('task-indent');
     }

            listItem.appendChild(dateSpan);
          listItem.appendChild(taskSpan);

            list.appendChild(listItem);
        });
    
        // Prefix-Warnung anzeigen/verstecken (nur in der Vorschau)
        if (listId === 'previewList') {
updatePrefixWarning();
        }
    }

    function updatePrefixWarning() {
        const noPrefixWarning = DOM.noPrefixWarning;
   if (!noPrefixWarning) return;
     
        if (DOM.prefix.value.trim() === '') {
        noPrefixWarning.classList.remove('hidden');
        } else {
  noPrefixWarning.classList.add('hidden');
        }
    }

    function showFinalSchedule() {
        renderList('scheduleList', true);
  DOM.zeitplanTitle2.textContent = DOM.zeitplanTitle.textContent;
        DOM.previewSection.classList.add('hidden');
    DOM.zeitplan.classList.remove('hidden');
  }

    /* ===== NAVIGATION ===== */
    function goToFinalPage() {
      saveFormState();
  DOM.generalForm.classList.add('hidden');
   DOM.previewSection.classList.add('hidden');
        showFinalSchedule();
        window.scrollTo(0, 0);
    }

    function goBackToPreview() {
 DOM.generalForm.classList.remove('hidden');
      DOM.previewSection.classList.remove('hidden');
   DOM.zeitplan.classList.add('hidden');
        window.scrollTo(0, 0);
    }

    /* ===== STATE MANAGEMENT ===== */
    function saveFormState() {
        const state = {
        prefix: DOM.prefix.value,
       scheduleType: DOM.scheduleType.value,
            steps: DOM.steps.value,
    startDate: DOM.startDate.value,
      angle: getWheelAngle(),
  isWheelMode: !DOM.wheelMode.classList.contains('hidden')
        };
        
        sessionStorage.setItem('formState', JSON.stringify(state));
    }

    function restoreFormState() {
 const savedState = sessionStorage.getItem('formState');
    if (!savedState) return;
        
        const state = JSON.parse(savedState);
        
      DOM.prefix.value = state.prefix || '';
        
      if (state.scheduleType) {
   DOM.scheduleType.value = state.scheduleType;
  populateSteps();
        }
   
    if (state.steps) {
     DOM.steps.value = state.steps;
        }

        if (state.startDate) {
            DOM.startDate.value = state.startDate;
        }
    
        if (state.angle !== undefined) {
            setWheelAngle(state.angle);
   drawWheel();
       updateWheelCalculation();
   }
        
        if (state.isWheelMode) {
            switchDateMode('wheel');
        }
    }

    function createScheduleData(scheduleType, startDate, selectedStep) {
        const baseDate = new Date(startDate);
        baseDate.setDate(baseDate.getDate() - selectedStep);

        return schedules[scheduleType].map(item => {
            const taskDate = new Date(baseDate);
  taskDate.setDate(taskDate.getDate() + item.offset);

            return {
        taskDate,
    task: item.task,
      additionalText: item.additionalText,
    dateFormatted: formatDateLong(taskDate),
         dateShort: formatDateShort(taskDate)
            };
        });
    }
</script>
</body>
</html>
